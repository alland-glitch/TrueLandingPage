<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Website - SyntheraLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-v3.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">SyntheraLink</h1>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#websites" class="nav-link">Explore</a></li>
                <li class="user-menu">
                    <a href="#" class="user-toggle">User ▼</a>
                    <ul class="dropdown">
                        <li><a href="#" id="logoutBtn">Logout</a></li>
                    </ul>
                </li>
            </ul>
            <button id="themeToggle" class="btn btn-secondary theme-toggle" aria-label="Toggle theme">☀️</button>
        </div>
    </nav>
    <div id="toast-container" class="toast-container"></div>

    <section class="submit-section fade-in">
        <div class="container">
            <div class="submit-container">
                <h2>Submit Your Website</h2>
                <p class="submit-description">Share amazing websites with the community. Your submission will be reviewed by our admins.</p>
                <div id="submit-error" class="form-error"></div>
                <form id="submit-form" class="submit-form">
                    <div class="form-group">
                    <label for="website-name">Website Name</label>
                    <input type="text" id="website-name" name="name" required placeholder="e.g., Google">
                </div>
                <div class="form-group">
                    <label for="website-url">Website URL</label>
                    <input type="url" id="website-url" name="url" required placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="website-description">Description</label>
                    <textarea id="website-description" name="description" required placeholder="Describe what this website is about..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-large" onclick="trackClick('submitWebsite')">Submit for Review</button>
            </form>
                <div id="submit-message" class="submit-message"></div>
            </div>
        </div>
    </section>

    <script src="script-v2.js"></script>
</body>
</html>
