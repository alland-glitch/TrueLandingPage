<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SyntheraLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-v3.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <h2>Login to SyntheraLink</h2>
                <button id="themeToggle" class="btn btn-secondary theme-toggle" aria-label="Toggle theme">☀️</button>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary" onclick="trackClick('loginBtn')">Login</button>
            </form>
            <p class="auth-link">Don't have an account? <a href="register-v2.html">Register here</a></p>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>

    <script src="script-v2.js"></script>
</body>
</html>
